<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/monogram.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#059669" />
    <meta name="color-scheme" content="light dark" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Discover Sri Lanka's rich culture, stunning landscapes, and warm hospitality with government-verified services and transparent pricing. Plan your perfect trip with our smart tourism portal." />
    <meta name="keywords" content="Sri Lanka tourism, Sri Lanka travel, Sri Lanka destinations, Sri Lanka experiences, Sri Lanka medical tourism, Sri Lanka pilgrimage, Sri Lanka adventure, Sri Lanka luxury travel, Sri Lanka government tourism, Sri Lanka smart tourism portal" />
    <meta name="geo.region" content="LK" />
    <meta name="geo.country" content="Sri Lanka" />
    <meta name="geo.placename" content="Sri Lanka" />
    <meta name="ICBM" content="7.8731, 80.7718" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://visitsrilanka.gov.lk" />
    <meta property="og:title" content="Visit Sri Lanka - Smart Tourism Portal" />
    <meta property="og:description" content="Discover Sri Lanka's rich culture, stunning landscapes, and warm hospitality with government-verified services and transparent pricing." />
    <meta property="og:image" content="/images/sri-lanka-hero.jpg" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://visitsrilanka.gov.lk" />
    <meta property="twitter:title" content="Visit Sri Lanka - Smart Tourism Portal" />
    <meta property="twitter:description" content="Discover Sri Lanka's rich culture, stunning landscapes, and warm hospitality with government-verified services and transparent pricing." />
    <meta property="twitter:image" content="/images/sri-lanka-hero.jpg" />
    
    <!-- Preload critical resources -->
    <!-- Note: Preload paths will be handled by Vite with base path -->
    
    <!-- DNS Prefetch for external resources -->
    <link rel="dns-prefetch" href="//fonts.googleapis.com" />
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- Favicon and Icons -->
    <link rel="icon" type="image/png" href="/images/monogram.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/monogram.png" />
    
    <!-- Structured Data for Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Visit Sri Lanka",
      "url": "https://visitsrilanka.gov.lk",
      "logo": "https://visitsrilanka.gov.lk/images/logo.png",
      "description": "Official Sri Lanka Tourism Platform",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "LK",
        "addressLocality": "Colombo",
        "addressRegion": "Western Province"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+94-11-242-6900",
        "contactType": "customer service",
        "availableLanguage": ["English", "Sinhala", "Tamil"]
      },
      "sameAs": [
        "https://www.facebook.com/VisitSriLanka",
        "https://www.instagram.com/visitsrilanka",
        "https://www.twitter.com/VisitSriLanka",
        "https://www.youtube.com/visitsrilanka"
      ]
    }
    </script>
    
    <title>Visit Sri Lanka - Smart Tourism Portal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
